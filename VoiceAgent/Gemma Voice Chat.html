<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Gemma Voice — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    font-family: 'Manrope', system-ui, sans-serif;
    background: #0b0d14;
    overflow: hidden;
    color: #fff;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.06), transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.06), transparent 50%),
      #0b0d14;
  }
  @keyframes wave {
    0%, 100% { height: 4px; }
    50%      { height: 28px; }
  }
  @keyframes ripple {
    0%   { transform: scale(1);   opacity: 0.8; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.6; }
    40%           { transform: translateY(-4px); opacity: 1; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.5); }
    50%      { box-shadow: 0 0 0 6px rgba(124,58,237,0); }
  }
  ::-webkit-scrollbar { display: none; }

  /* Phone frame */
  .phone {
    width: 412px;
    height: 892px;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 8px #1a1d28,
      0 0 0 10px #2a2d38,
      0 40px 120px rgba(124,58,237,0.15),
      0 20px 60px rgba(0,0,0,0.5);
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(20,23,34,0.92);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px;
    backdrop-filter: blur(20px);
    display: none;
    min-width: 200px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.9);
  }
  .tweaks.on { display: block; }
  .tweaks h4 {
    margin: 0 0 10px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.8px; color: rgba(255,255,255,0.5);
    font-weight: 600;
  }
  .tweaks label {
    display: block; margin-bottom: 8px; font-size: 11px;
    color: rgba(255,255,255,0.6);
  }
  .state-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .state-btn {
    padding: 8px; border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    font-family: inherit; font-size: 11px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.4px;
    transition: all 0.2s;
  }
  .state-btn:hover { background: rgba(255,255,255,0.08); }
  .state-btn.active {
    background: linear-gradient(90deg, rgba(124,58,237,0.3), rgba(6,182,212,0.3));
    border-color: rgba(124,58,237,0.5);
    color: #fff;
  }
</style>
</head>
<body>

<div class="tweaks" id="tweaks">
  <h4>Tweaks</h4>
  <label>Voice state</label>
  <div class="state-row" id="stateRow">
    <button class="state-btn" data-state="idle">Idle</button>
    <button class="state-btn" data-state="listening">Listening</button>
    <button class="state-btn" data-state="thinking">Thinking</button>
    <button class="state-btn" data-state="speaking">Speaking</button>
  </div>
</div>

<div class="phone">
  <div id="root" style="width:100%; height:100%;"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="chat.jsx"></script>
<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "initialState": "idle"
  }/*EDITMODE-END*/;

  let currentTweaks = { ...TWEAK_DEFAULTS };

  function App() {
    const [tweaks, setTweaks] = React.useState(currentTweaks);
    React.useEffect(() => {
      window.__setTweaks = (patch) => {
        currentTweaks = { ...currentTweaks, ...patch };
        setTweaks(currentTweaks);
      };
    }, []);
    return <ChatScreen tweaks={tweaks} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  // Tweaks wiring
  const tweaksEl = document.getElementById('tweaks');
  const stateButtons = document.querySelectorAll('[data-state]');

  function updateActive() {
    stateButtons.forEach(b => {
      b.classList.toggle('active', b.dataset.state === currentTweaks.initialState);
    });
  }
  updateActive();

  stateButtons.forEach(b => {
    b.addEventListener('click', () => {
      const s = b.dataset.state;
      window.__setTweaks({ initialState: s });
      updateActive();
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { initialState: s } }, '*');
    });
  });

  window.addEventListener('message', (e) => {
    if (!e.data) return;
    if (e.data.type === '__activate_edit_mode') tweaksEl.classList.add('on');
    if (e.data.type === '__deactivate_edit_mode') tweaksEl.classList.remove('on');
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
</script>
</body>
</html>
